baseURL = "https://ftqo.dev/"
languageCode = "en-us"
title = "ftqo"
paginate = 5
theme = "PaperMod"
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[minify]
disableXML = true
minifyOutput = true

[params]
env = "production"
title = "ftqo"
description = "ftqo's personal website"
keywords = [ "Blog", "Portfolio", "ftqo" ]
author = "Me"
images = [ "<link or path of image for opengraph, twitter-cards>" ]
DateFormat = "January 2, 2006"
defaultTheme = "auto"
disableThemeToggle = false
ShowReadingTime = true
ShowShareButtons = true
ShowPostNavLinks = true
ShowBreadCrumbs = true
ShowCodeCopyButtons = false
disableSpecial1stPost = false
disableScrollToTop = false
comments = false
hidemeta = false
hideSummary = false
showtoc = false
tocopen = false

  [params.assets]
  favicon = "/img/favicon.ico"
  favicon16x16 = "/img/favicon-16x16.png"
  favicon32x32 = "/img/favicon-32x32.png"
  apple_touch_icon = "/img/apple-touch-icon.png"

  [params.label]
  iconHeight = 35

  [params.homeInfoParams]
  Title = "hi there 👋"
  Content = "welcome to my temporary website. this website was generated by hugo and is hosted on cloudflare pages. contact me at any of the links below!"

  [[params.socialIcons]]
  name = "github"
  url = "https://github.com/ftqo"

  [[params.socialIcons]]
  name = "email"
  url = "mailto:me@ftqo.dev"

  [[params.socialIcons]]
  name = "keybase"
  url = "https://keybase.io/ftqo"

  [params.cover]
  hidden = true
  hiddenInList = true
  hiddenInSingle = true

  [params.fuseOpts]
  isCaseSensitive = false
  shouldSort = true
  location = 0
  distance = 1_000
  threshold = 0.4
  minMatchCharLength = 0
  keys = [ "title", "permalink", "summary", "content" ]
